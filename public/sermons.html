<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sermons - Sermon Manager</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img
          src="/images/followers_logo.png"
          alt="Followers Logo"
          class="logo"
        />
      </div>
      <header>
        <h1>Sermons</h1>
        <nav>
          <a href="/index.html">Upload Sermon</a>
          <button id="logout-btn" class="secondary">Logout</button>
        </nav>
      </header>

      <main>
        <div id="sermons-container">
          <p class="loading">Loading sermons...</p>
        </div>

        <div id="pagination" class="pagination hidden">
          <button id="load-more" class="secondary">Load More</button>
        </div>
      </main>
    </div>

    <script type="module" src="/js/src/sermons.js"></script>
  </body>
</html>
